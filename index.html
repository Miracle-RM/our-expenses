<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js';
import { getDatabase, ref, set, push, remove, onValue, off, enableLogging } from 'https://www.gstatic.com/firebasejs/11.4.0/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyAZrYWr1SSkp5pnVXkJz_gEThunnkKaFxw",
  authDomain: "japan-expense-claude.firebaseapp.com",
  databaseURL: "https://japan-expense-claude-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "japan-expense-claude",
  storageBucket: "japan-expense-claude.firebasestorage.app",
  messagingSenderId: "418476324120",
  appId: "1:418476324120:web:89a3f3b4f76b469bbada6d"
};

const fbApp = initializeApp(firebaseConfig);
const db = getDatabase(fbApp);

// ─── PIN Lock ───
const APP_PIN = "1234"; // Change to your own PIN
const PIN_KEY = "travelx-pin";

// ─── Currencies ───
const CUR={AED:{s:"AED",n:"UAE Dirham",f:"🇦🇪",r:1},USD:{s:"$",n:"US Dollar",f:"🇺🇸",r:0.2723},PHP:{s:"₱",n:"Philippine Peso",f:"🇵🇭",r:16.53},EUR:{s:"€",n:"Euro",f:"🇪🇺",r:0.2513},GBP:{s:"£",n:"British Pound",f:"🇬🇧",r:0.2118},JPY:{s:"¥",n:"Japanese Yen",f:"🇯🇵",r:43.49},KRW:{s:"₩",n:"Korean Won",f:"🇰🇷",r:393.2},THB:{s:"฿",n:"Thai Baht",f:"🇹🇭",r:8.96},SGD:{s:"S$",n:"Singapore Dollar",f:"🇸🇬",r:0.3514},CNY:{s:"¥",n:"Chinese Yuan",f:"🇨🇳",r:1.883},AUD:{s:"A$",n:"Aus Dollar",f:"🇦🇺",r:0.3975},CHF:{s:"CHF",n:"Swiss Franc",f:"🇨🇭",r:0.2495},TRY:{s:"₺",n:"Turkish Lira",f:"🇹🇷",r:10.42},MYR:{s:"RM",n:"Ringgit",f:"🇲🇾",r:1.10},INR:{s:"₹",n:"Indian Rupee",f:"🇮🇳",r:25.60}};
const PRI=["AED","USD","PHP"];
const toAED=(a,c)=>a/(CUR[c]?.r||1);
const fromAED=(a,c)=>a*(CUR[c]?.r||1);
const fmt=(a,c="AED")=>{const C=CUR[c];const v=Number(a||0);if(["JPY","KRW"].includes(c))return C.s+" "+Math.round(v).toLocaleString();return C.s+" "+v.toLocaleString("en",{minimumFractionDigits:2,maximumFractionDigits:2})};

// ─── Tax data ───
const TAX={JP:{name:"Japan",flag:"🇯🇵",rate:10,notes:"Currently tax-exempt at purchase. From Nov 2026: pay first, refund at airport. 10% goods, 8% food. Min ¥5,000/store/day."},KR:{name:"South Korea",flag:"🇰🇷",rate:10,notes:"Refund at airport/city kiosks. Min ₩15,000. Within 3 months."},TH:{name:"Thailand",flag:"🇹🇭",rate:7,notes:"7% VAT refund at participating stores. Min ฿2,000/store/day."},SG:{name:"Singapore",flag:"🇸🇬",rate:9,notes:"9% GST via eTRS at airport. Min S$100/store."},FR:{name:"France",flag:"🇫🇷",rate:20,notes:"20% VAT. PABLO kiosks. Min €100.01/store/day."},DE:{name:"Germany",flag:"🇩🇪",rate:19,notes:"19% VAT. Customs stamp. Min €50/store."},IT:{name:"Italy",flag:"🇮🇹",rate:22,notes:"22% VAT — highest major EU. Min €70.01."},ES:{name:"Spain",flag:"🇪🇸",rate:21,notes:"21% VAT. DIVA digital system."},GB:{name:"UK",flag:"🇬🇧",rate:0,notes:"⚠️ No tourist VAT refund since Jan 2021."},AU:{name:"Australia",flag:"🇦🇺",rate:10,notes:"10% GST TRS. Min A$300+/store."},TR:{name:"Turkey",flag:"🇹🇷",rate:20,notes:"20% VAT for non-residents."},MY:{name:"Malaysia",flag:"🇲🇾",rate:10,notes:"10% Sales Tax. Min RM300/store."},CH:{name:"Switzerland",flag:"🇨🇭",rate:8.1,notes:"8.1% VAT. 30 days. Min CHF300."},AE:{name:"UAE",flag:"🇦🇪",rate:5,notes:"5% VAT. Planet app. Min AED 250."},CN:{name:"China",flag:"🇨🇳",rate:13,notes:"13% VAT. Min ¥500."},IN:{name:"India",flag:"🇮🇳",rate:0,notes:"⚠️ No GST refund for tourists."}};

const CATS=[{id:"groceries",name:"Groceries",icon:"🛒",color:"#2D9C5A"},{id:"dining",name:"Dining Out",icon:"🍽️",color:"#E07B4C"},{id:"bills",name:"Bills & Utilities",icon:"⚡",color:"#5B7FD6"},{id:"transport",name:"Transport",icon:"🚗",color:"#9B6FC3"},{id:"shopping",name:"Shopping",icon:"🛍️",color:"#D65B8A"},{id:"healthcare",name:"Healthcare",icon:"🏥",color:"#4BADA8"},{id:"accommodation",name:"Stay",icon:"🏨",color:"#C4A43B"},{id:"activities",name:"Activities",icon:"🎯",color:"#E05555"},{id:"souvenirs",name:"Souvenirs",icon:"🎁",color:"#7C6FB0"}];
const PEOPLE=["Husband","Wife"];

// ─── Helpers ───
const gid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const gmk=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
const gml=k=>{const[y,m]=k.split("-");return new Date(y,m-1).toLocaleString("en",{month:"short",year:"numeric"})};
const $=s=>document.querySelector(s);
const h=(tag,cls,html)=>{const el=document.createElement(tag);if(cls)el.className=cls;if(html!==undefined)el.innerHTML=html;return el};

// ─── State ───
let expenses={};  // keyed by firebase push ID
let categories=[...CATS];
let view="home",selMo=gmk(new Date()),dCur="AED",editKey=null;
let fAmt="",fCur="AED",fCat="",fPaid=PEOPLE[0],fNote="",fDate=new Date().toISOString().slice(0,10),fCo="JP",fTF=false,fRec=null;
let tCo="JP",tMode="calc";
let syncStatus="connecting";

// ─── Firebase Sync ───
const expRef=ref(db,"expenses");
const catRef=ref(db,"categories");

onValue(expRef,snap=>{
  expenses=snap.val()||{};
  syncStatus="synced";
  render();
},{cancelCallback:err=>{syncStatus="offline";render()}});

onValue(catRef,snap=>{
  const val=snap.val();
  if(val)categories=val;
});

// Also detect connection state
const connRef=ref(db,".info/connected");
onValue(connRef,snap=>{
  syncStatus=snap.val()?"synced":"offline";
  const dot=$(".sync-dot");
  if(dot){dot.style.background=syncStatus==="synced"?"#2D9C5A":"#E07B4C";dot.title=syncStatus}
});

function fbSet(path,val){return set(ref(db,path),val)}
function fbPush(path,val){const r=push(ref(db,path));set(r,val);return r.key}
function fbRemove(path){return remove(ref(db,path))}

// ─── Derived ───
function expList(){return Object.entries(expenses).map(([k,v])=>({...v,_key:k}))}
function gc(id){return categories.find(c=>c.id===id)||{name:id,icon:"📦",color:"#888"}}
function disp(aed){return fmt(fromAED(aed,dCur),dCur)}
function filtered(){return expList().filter(e=>gmk(new Date(e.date))===selMo).sort((a,b)=>new Date(b.date)-new Date(a.date))}
function allMonths(){const ms=[...new Set(expList().map(e=>gmk(new Date(e.date))))].sort().reverse();if(!ms.includes(selMo))ms.unshift(selMo);return ms}
function flash(msg,type="success"){const t=h("div","toast "+type,msg);document.body.appendChild(t);setTimeout(()=>t.remove(),2200)}
function resetForm(){fAmt="";fCur="AED";fCat="";fPaid=PEOPLE[0];fNote="";fDate=new Date().toISOString().slice(0,10);fCo="JP";fTF=false;fRec=null;editKey=null}

// ─── Render engine ───
function render(){
  const app=document.getElementById("app");app.innerHTML="";
  if(sessionStorage.getItem(PIN_KEY)!=="yes"){renderLock(app);return}
  if(view==="home")renderHome(app);
  else if(view==="add")renderAdd(app);
  else if(view==="stats")renderStats(app);
  else if(view==="tax")renderTax(app);
  else if(view==="categories")renderCats(app);
  renderNav(app);
}

function renderLock(app){
  app.innerHTML=`<div class="lock"><h1>Our Expenses</h1><p>Enter PIN to continue</p><input type="password" inputmode="numeric" maxlength="6" placeholder="••••" id="pinInp"><button onclick="checkPin()">Unlock</button><div class="err" id="pinErr"></div></div>`;
  setTimeout(()=>{const i=document.getElementById("pinInp");i?.focus();i?.addEventListener("keydown",e=>{if(e.key==="Enter")checkPin()})},100);
}
window.checkPin=()=>{const i=document.getElementById("pinInp");if(i.value===APP_PIN){sessionStorage.setItem(PIN_KEY,"yes");render()}else document.getElementById("pinErr").textContent="Wrong PIN"};

function renderHome(app){
  const f=filtered(),tot=f.reduce((s,e)=>s+e.amount,0);
  const byP=PEOPLE.map(p=>({name:p,total:f.filter(e=>e.paidBy===p).reduce((s,e)=>s+e.amount,0)}));
  app.innerHTML=`
  <div class="hdr"><div style="display:flex;justify-content:space-between;align-items:flex-start">
    <div><h1>Travel Expenses</h1><p>Real-time sync <span class="sync-dot" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${syncStatus==="synced"?"#2D9C5A":"#E07B4C"};margin-left:6px;vertical-align:middle" title="${syncStatus}"></span></p></div>
    <button class="ct" onclick="showCurPicker()">${CUR[dCur].f} ${dCur} ▾</button>
  </div></div>
  <div class="hs" id="moScroll"></div>
  <div class="cg"><div class="card hero" style="grid-column:1/-1"><div class="lbl">Total this month</div><div class="val">${disp(tot)}</div>${dCur!=="AED"?`<div style="font-size:12px;color:var(--t2);margin-top:2px">${fmt(tot,"AED")}</div>`:""}</div></div>
  <div class="cg c2">${byP.map(p=>`<div class="card"><div class="lbl">${p.name==="Husband"?"🙋‍♂️":"🙋‍♀️"} ${p.name}</div><div class="val" style="font-size:16px;color:${p.name==="Husband"?"var(--gd)":"var(--tl)"}">${disp(p.total)}</div></div>`).join("")}</div>
  <div style="display:flex;justify-content:space-between;align-items:center;padding:4px 20px 6px"><div class="sec" style="padding:0">${f.length} item${f.length!==1?"s":""}</div><button class="ibtn" onclick="exportCSV()">📤 Export</button></div>
  <div class="el" id="expList"></div>`;

  const ms=document.getElementById("moScroll");
  allMonths().forEach(m=>{const b=h("button","pill"+(m===selMo?" on":""),gml(m));b.onclick=()=>{selMo=m;render()};ms.appendChild(b)});

  const el=document.getElementById("expList");
  if(f.length===0){el.innerHTML=`<div class="empty"><div class="eI">✈️</div><p>No expenses yet.<br>Tap + to start!</p></div>`}
  else f.forEach(e=>{
    const cat=gc(e.category),co=TAX[e.country];
    const d=h("div","eitem");
    d.innerHTML=`<div class="eico" style="background:${cat.color}15">${cat.icon}</div><div class="einfo"><div class="enm">${cat.name}${e.taxFree?'<span class="tbdg">TAX FREE</span>':""}${e.receipt?'<span class="rdot"></span>':""}</div><div class="emt"><span>${co?.flag||""}</span><span>${new Date(e.date).toLocaleDateString("en-GB",{day:"numeric",month:"short"})}</span><span style="color:${e.paidBy==="Husband"?"var(--gd)":"var(--tl)"}">${e.paidBy}</span>${e.origCur&&e.origCur!=="AED"?`<span style="opacity:.5">${fmt(e.origAmt,e.origCur)}</span>`:""}${e.note?`<span style="opacity:.5">· ${e.note}</span>`:""}</div></div><div class="eamt">${disp(e.amount)}</div>`;
    const acts=h("div","eacts");
    if(e.receipt){const rb=h("button","ab r","🖼");rb.onclick=ev=>{ev.stopPropagation();showReceipt(e.receipt)};acts.appendChild(rb)}
    const eb=h("button","ab e","✏️");eb.onclick=ev=>{ev.stopPropagation();fAmt=(e.origAmt||e.amount).toString();fCur=e.origCur||"AED";fCat=e.category;fPaid=e.paidBy;fNote=e.note||"";fDate=e.date;fCo=e.country||"JP";fTF=e.taxFree||false;fRec=e.receipt||null;editKey=e._key;view="add";render()};acts.appendChild(eb);
    const db2=h("button","ab d","🗑");db2.onclick=ev=>{ev.stopPropagation();if(confirm("Delete?")){fbRemove("expenses/"+e._key);flash("Deleted","del")}};acts.appendChild(db2);
    d.appendChild(acts);el.appendChild(d);
  });
}

function renderAdd(app){
  const allCurKeys=Object.keys(CUR);
  const topCur=[...PRI,...allCurKeys.filter(c=>!PRI.includes(c)).slice(0,5)];
  const restCur=allCurKeys.filter(c=>!topCur.includes(c));

  app.innerHTML=`<div class="frm" style="padding-top:28px">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px"><h2 style="font-size:20px;font-weight:700">${editKey?"Edit":"New Expense"}</h2><button class="back" onclick="resetForm();view='home';render()">Cancel</button></div>
  <div class="fg"><label class="fl">Amount</label><div style="position:relative"><input class="fi big" type="number" inputmode="decimal" placeholder="0.00" id="fAmtI" value="${fAmt}"><div class="cur-row">${topCur.map(c=>`<button class="cc${fCur===c?" on":""}" onclick="fCur='${c}';render()">${CUR[c].f} ${c}</button>`).join("")}</div></div>${fCur!=="AED"&&fAmt?`<div style="text-align:center;font-size:13px;color:var(--t2);margin-top:6px">≈ ${fmt(toAED(parseFloat(fAmt),fCur),"AED")}</div>`:""}<div class="hs" style="margin-top:6px;padding:0">${restCur.map(c=>`<button class="cc${fCur===c?" on":""}" onclick="fCur='${c}';render()">${CUR[c].f} ${c}</button>`).join("")}</div></div>
  <div class="fg"><label class="fl">Country</label><div class="hs" style="padding:0">${Object.entries(TAX).map(([k,c])=>`<button class="pill${fCo===k?" on":""}" onclick="fCo='${k}';render()" style="display:flex;align-items:center;gap:4px">${c.flag} ${c.name}</button>`).join("")}</div></div>
  <div class="fg"><label class="fl">Category</label><div class="catg">${categories.map(c=>`<button class="catb${fCat===c.id?" on":""}" onclick="fCat='${c.id}';render()"><span class="ci">${c.icon}</span><span class="cl">${c.name}</span></button>`).join("")}</div></div>
  <div class="fg"><label class="fl">Paid By</label><div class="perg">${PEOPLE.map(p=>`<button class="perb${fPaid===p?" on":""}" onclick="fPaid='${p}';render()">${p==="Husband"?"🙋‍♂️":"🙋‍♀️"} ${p}</button>`).join("")}</div></div>
  <div class="fg"><div class="trow${fTF?" trow-on":""}" onclick="fTF=!fTF;render()"><div><div style="font-weight:600;font-size:14px">🏷️ Tax-Free Purchase</div><div style="font-size:11px;color:var(--t2);margin-top:2px">${TAX[fCo]?.rate||0}% refund — ${TAX[fCo]?.name}</div></div><div class="ttk${fTF?" on":""}"><div class="tkn"></div></div></div></div>
  <div class="fg"><label class="fl">Date</label><input class="fi" type="date" id="fDateI" value="${fDate}"></div>
  <div class="fg"><label class="fl">Note</label><input class="fi" type="text" placeholder="e.g. Don Quijote Shibuya" id="fNoteI" value="${fNote}"></div>
  <div class="fg"><label class="fl">Receipt</label>${fRec?`<img src="${fRec}" class="rprev"><button style="margin-top:6px;background:none;border:none;color:var(--cr);font-size:12px;cursor:pointer;font-weight:600" onclick="fRec=null;render()">✕ Remove</button>`:`<div class="rbtns"><button class="rbtn" onclick="captureReceipt('camera')">📸 Camera</button><button class="rbtn" onclick="captureReceipt('file')">📁 Upload</button></div>`}</div>
  <button class="submit" ${!fAmt||!fCat?"disabled":""} onclick="submitExp()">💾 ${editKey?"Update":"Add Expense"}</button>
  </div>`;

  document.getElementById("fAmtI")?.addEventListener("input",e=>{fAmt=e.target.value});
  document.getElementById("fDateI")?.addEventListener("change",e=>{fDate=e.target.value});
  document.getElementById("fNoteI")?.addEventListener("input",e=>{fNote=e.target.value});
}

window.submitExp=()=>{
  if(!fAmt||!fCat)return;
  const aed=toAED(parseFloat(fAmt),fCur);
  const exp={amount:aed,origAmt:parseFloat(fAmt),origCur:fCur,category:fCat,paidBy:fPaid,note:fNote,date:fDate,country:fCo,taxFree:fTF,receipt:fRec,ts:Date.now()};
  if(editKey)fbSet("expenses/"+editKey,exp);
  else fbPush("expenses",exp);
  flash(editKey?"Updated!":"Added!");
  resetForm();view="home";render();
};

window.captureReceipt=(mode)=>{
  const inp=document.createElement("input");inp.type="file";inp.accept="image/*";
  if(mode==="camera")inp.capture="environment";
  inp.onchange=e=>{const f=e.target.files[0];if(!f)return;
    // Compress image to save Firebase storage
    const reader=new FileReader();
    reader.onload=ev=>{
      const img=new Image();img.onload=()=>{
        const MAX=800;let w=img.width,ht=img.height;
        if(w>MAX){ht*=MAX/w;w=MAX}if(ht>MAX){w*=MAX/ht;ht=MAX}
        const canvas=document.createElement("canvas");canvas.width=w;canvas.height=ht;
        canvas.getContext("2d").drawImage(img,0,0,w,ht);
        fRec=canvas.toDataURL("image/jpeg",0.6);render();
      };img.src=ev.target.result;
    };reader.readAsDataURL(f);
  };inp.click();
};

function renderStats(app){
  const f=filtered(),tot=f.reduce((s,e)=>s+e.amount,0);
  const byP=PEOPLE.map(p=>({name:p,total:f.filter(e=>e.paidBy===p).reduce((s,e)=>s+e.amount,0)}));
  const byC=categories.map(c=>({...c,total:f.filter(e=>e.category===c.id).reduce((s,e)=>s+e.amount,0)})).filter(c=>c.total>0).sort((a,b)=>b.total-a.total);
  const byCo=Object.entries(TAX).map(([k,c])=>({k,...c,total:f.filter(e=>e.country===k).reduce((s,e)=>s+e.amount,0)})).filter(c=>c.total>0).sort((a,b)=>b.total-a.total);

  const bar=(label,val,pct,col)=>`<div class="bi"><div class="bh"><span class="bl">${label}</span><span class="bv">${val}</span></div><div class="bt"><div class="bf" style="width:${pct}%;background:${col}"></div></div></div>`;

  app.innerHTML=`
  <div class="hdr"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><h1>Statistics</h1><p>Breakdown</p></div><button class="ct" onclick="showCurPicker()">${CUR[dCur].f} ${dCur} ▾</button></div></div>
  <div class="hs" id="stMo"></div>
  <div class="cg"><div class="card hero"><div class="lbl">Month Total</div><div class="val">${disp(tot)}</div>${dCur!=="AED"?`<div style="font-size:12px;color:var(--t2);margin-top:2px">${fmt(tot,"AED")}</div>`:""}</div></div>
  <div class="sec">By Category</div>${byC.length?byC.map(c=>bar(c.icon+" "+c.name,disp(c.total)+" ("+(tot?Math.round(c.total/tot*100):0)+"%)",tot?c.total/tot*100:0,c.color)).join(""):'<div class="empty"><p>No data</p></div>'}
  <div class="sec" style="margin-top:8px">By Person</div>${byP.map(p=>bar((p.name==="Husband"?"🙋‍♂️":"🙋‍♀️")+" "+p.name,disp(p.total),tot?p.total/tot*100:0,p.name==="Husband"?"var(--gd)":"var(--tl)")).join("")}
  <div class="sec" style="margin-top:8px">By Country</div>${byCo.length?byCo.map(c=>bar(c.flag+" "+c.name,disp(c.total),tot?c.total/tot*100:0,"var(--tl)")).join(""):'<div class="empty"><p>No data</p></div>'}`;

  const ms=document.getElementById("stMo");
  allMonths().forEach(m=>{const b=h("button","pill"+(m===selMo?" on":""),gml(m));b.onclick=()=>{selMo=m;render()};ms.appendChild(b)});
}

function renderTax(app){
  const tCD=TAX[tCo],all=expList(),tEl=all.filter(e=>e.country===tCo&&e.taxFree),tTot=tEl.reduce((s,e)=>s+e.amount,0),tRef=tTot*(tCD?.rate||0)/(100+(tCD?.rate||0));
  const allTC=[...new Set(all.filter(e=>e.taxFree).map(e=>e.country))];
  const grandRef=Object.entries(TAX).reduce((sum,[k,c])=>{const el=all.filter(e=>e.country===k&&e.taxFree);const tot=el.reduce((s,e)=>s+e.amount,0);return sum+(tot*c.rate/(100+c.rate))},0);

  app.innerHTML=`
  <div class="hdr"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><h1>Tax Refund</h1><p>Eligible refunds</p></div><button class="ct" onclick="showCurPicker()">${CUR[dCur].f} ${dCur} ▾</button></div></div>
  <div style="display:flex;gap:6px;padding:0 20px 12px"><button class="tab${tMode==="calc"?" on":""}" onclick="tMode='calc';render()">Calculator</button><button class="tab${tMode==="all"?" on":""}" onclick="tMode='all';render()">All Countries</button></div>
  <div id="taxContent"></div>`;

  const tc=document.getElementById("taxContent");
  if(tMode==="calc"){
    tc.innerHTML=`<div class="hs" id="taxCo"></div>
    <div class="tcard"><div style="display:flex;align-items:center;gap:12px;margin-bottom:14px"><span style="font-size:36px">${tCD?.flag}</span><div><div style="font-weight:700;font-size:18px">${tCD?.name}</div><div style="font-size:12px;color:var(--t2)">Tax: ${tCD?.rate}%</div></div></div><div style="font-size:12px;color:var(--t2)"><strong>Tax-free items:</strong> ${tEl.length} · ${disp(tTot)}</div><div class="trbig">${tCD?.rate>0?disp(tRef):"No refund"}</div><div style="font-size:12px;color:var(--t2)">${tCD?.rate>0?"Est. "+tCD.rate+"% refund":"No tourist refunds."}</div><div class="tibox">ℹ️ ${tCD?.notes}</div></div>
    ${tEl.length?`<div class="sec">Eligible</div><div class="el">${tEl.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(e=>{const cat=gc(e.category);const rf=e.amount*tCD.rate/(100+tCD.rate);return`<div class="eitem"><div class="eico" style="background:${cat.color}15">${cat.icon}</div><div class="einfo"><div class="enm">${cat.name}</div><div class="emt"><span>${new Date(e.date).toLocaleDateString("en-GB",{day:"numeric",month:"short"})}</span><span>·</span><span>${disp(e.amount)}</span></div></div><div class="eamt" style="color:var(--tl)">+${disp(rf)}</div></div>`}).join("")}</div>`:""}`;
    const txs=document.getElementById("taxCo");
    Object.entries(TAX).forEach(([k,c])=>{const b=h("button","pill"+(tCo===k?" on":""),c.flag+" "+c.name);b.onclick=()=>{tCo=k;render()};txs.appendChild(b)});
  }else{
    tc.innerHTML=`<div class="tcard"><div class="lbl">Total Refund — All Countries</div><div class="trbig">${disp(grandRef)}</div><div style="font-size:12px;color:var(--t2)">${allTC.length} countr${allTC.length===1?"y":"ies"}</div></div>
    <div class="sec">By Country</div><div style="padding:0 20px">${allTC.length?Object.entries(TAX).map(([k,c])=>{const el=all.filter(e=>e.country===k&&e.taxFree);if(!el.length)return"";const tot=el.reduce((s,e)=>s+e.amount,0);const rf=tot*c.rate/(100+c.rate);return`<div class="tcitem" onclick="tCo='${k}';tMode='calc';render()"><span style="font-size:28px">${c.flag}</span><div style="flex:1"><div style="font-weight:600;font-size:14px">${c.name}</div><div style="font-size:11px;color:var(--t2)">${el.length} items · ${c.rate}%</div></div><div style="font-weight:700;font-size:14px;color:var(--tl)">+${disp(rf)}</div></div>`}).join(""):'<div class="empty"><div class="eI">🏷️</div><p>No tax-free purchases yet</p></div>'}</div>`;
  }
}

function renderCats(app){
  app.innerHTML=`<div style="padding:28px 20px 20px"><h2 style="font-size:20px;font-weight:700;margin-bottom:18px">Categories</h2>
  <div id="catList"></div>
  <div class="sec" style="padding:24px 0 6px">Exchange Rates</div><div style="font-size:11px;color:var(--t2);margin-bottom:8px">Approximate rates vs 1 AED</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">${Object.entries(CUR).map(([k,c])=>`<div style="padding:8px 10px;background:var(--cd);border-radius:10px;font-size:12px;display:flex;justify-content:space-between;border:1px solid rgba(255,255,255,0.02)"><span>${c.f} ${k}</span><span style="color:var(--t2)">${c.r===1?"Base":c.r}</span></div>`).join("")}</div></div>`;
  const cl=document.getElementById("catList");
  categories.forEach(c=>{
    const d=h("div","cmitem",`<span style="font-size:20px">${c.icon}</span><span style="font-weight:500;font-size:13px">${c.name}</span><span style="width:12px;height:12px;border-radius:3px;background:${c.color};margin-left:4px"></span>`);
    const rb=h("button","crm","✕");rb.onclick=()=>{categories=categories.filter(x=>x.id!==c.id);fbSet("categories",categories);render()};
    d.appendChild(rb);cl.appendChild(d);
  });
}

function renderNav(app){
  const nav=h("div","bnav");
  [{v:"home",i:"📋",l:"Home"},{v:"stats",i:"📊",l:"Stats"},{v:"add",i:"+",l:"",m:1},{v:"tax",i:"🏷️",l:"Tax"},{v:"categories",i:"⚙️",l:"More"}].forEach(n=>{
    const b=h("button",n.m?"nb add-main":"nb"+(view===n.v?" on":""),`<span class="ni">${n.i}</span>${n.l}`);
    b.onclick=()=>{if(n.v==="add")resetForm();view=n.v;render()};nav.appendChild(b);
  });app.appendChild(nav);
}

// ─── Modals ───
window.showCurPicker=()=>{
  const ov=h("div","ov");ov.onclick=()=>ov.remove();
  const pick=h("div","cpick",`<div style="font-weight:700;font-size:16px;margin-bottom:14px">Display Currency</div><div style="font-size:11px;color:var(--t2);margin-bottom:12px">All totals convert to this</div>`);
  pick.onclick=e=>e.stopPropagation();
  const list=h("div","clist");
  [...PRI,...Object.keys(CUR).filter(c=>!PRI.includes(c)).sort()].forEach(code=>{
    const b=h("button","copt"+(dCur===code?" on":""),`<span style="font-size:18px">${CUR[code].f}</span><span style="font-weight:600;font-size:13px">${code}</span><span style="font-size:9px;color:var(--t2)">${CUR[code].n}</span>`);
    b.onclick=()=>{dCur=code;ov.remove();render()};list.appendChild(b);
  });pick.appendChild(list);ov.appendChild(pick);document.body.appendChild(ov);
};

window.showReceipt=(src)=>{const ov=h("div","r-modal");ov.onclick=()=>ov.remove();ov.innerHTML=`<button class="r-close" onclick="this.parentElement.remove()">✕</button><img src="${src}" style="max-width:100%;max-height:80vh;border-radius:12px">`;document.body.appendChild(ov)};

window.exportCSV=()=>{
  const f=filtered();
  const csv=["Date,Country,Category,OrigAmt,Currency,AED,PaidBy,TaxFree,Note",...f.map(e=>{const cat=gc(e.category);const co=TAX[e.country];return`${e.date},${co?.name||e.country},${cat?.name||e.category},${e.origAmt||e.amount},${e.origCur||"AED"},${e.amount.toFixed(2)},${e.paidBy},${e.taxFree?"Y":"N"},"${e.note||""}"`;})].join("\n");
  const b=new Blob([csv],{type:"text/csv"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=`expenses-${selMo}.csv`;a.click();flash("Exported!");
};

// Make globals accessible from inline handlers
window.fCur=fCur;window.fCo=fCo;window.fCat=fCat;window.fPaid=fPaid;window.fTF=fTF;window.fRec=fRec;
window.tCo=tCo;window.tMode=tMode;window.view=view;window.selMo=selMo;window.dCur=dCur;
window.render=render;window.resetForm=resetForm;

// Proxy setters so inline onclick can update module vars
["fCur","fCo","fCat","fPaid","fTF","fRec","tCo","tMode","view","selMo","dCur"].forEach(k=>{
  let v=eval(k);
  Object.defineProperty(window,k,{get:()=>v,set:val=>{v=val;eval(k+"=val")},configurable:true});
});

// Boot
render();
</script>

<style>
