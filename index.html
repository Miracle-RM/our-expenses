function dbPath(){return appMode==="travel"?"travel":"home_expenses"}
function expList(){var a=[];for(var k in expenses)if(expenses.hasOwnProperty(k)){var e=Object.assign({},expenses[k]);e._key=k;a.push(e)}return a}
function filtered(){return expList().filter(function(e){return gmk(new Date(e.date))===selMo}).sort(function(a,b){return new Date(b.date)-new Date(a.date)})}
function allMonths(){var s={},a=[];expList().forEach(function(e){var m=gmk(new Date(e.date));if(!s[m]){s[m]=1;a.push(m)}});a.sort().reverse();if(a.indexOf(selMo)<0)a.unshift(selMo);return a}

// ─── Firebase ───
var currentListener=null;
function attachListener(){
  if(currentListener)db.ref(currentListener).off();
  currentListener=dbPath();
  db.ref(currentListener).on("value",function(s){expenses=s.val()||{};syncStatus="synced";render()});
}
db.ref(".info/connected").on("value",function(s){syncStatus=s.val()?"synced":"offline";var d=document.querySelector(".sync-dot");if(d)d.style.background=syncStatus==="synced"?"#2D9C5A":"#E07B4C"});
attachListener();

function switchMode(m){appMode=m;localStorage.setItem("fex-mode",m);expenses={};attachListener();view="home";render()}

// ─── Actions ───
function submitExp(){if(!fAmt||!fCat)return;var aed=toAED(parseFloat(fAmt),fCur);var exp={amount:aed,origAmt:parseFloat(fAmt),origCur:fCur,category:fCat,paidBy:fPaid,note:fNote,date:fDate,ts:Date.now()};if(appMode==="travel"){exp.country=fCo;exp.taxFree=fTF;} exp.receipt=fRec;if(editKey)db.ref(dbPath()+"/"+editKey).set(exp);else db.ref(dbPath()).push(exp);lastCo=fCo;lastCur=fCur;flash(editKey?"Updated!":"Added!");resetForm();view="home";render()}
function editExp(key){var e=expenses[key];if(!e)return;fAmt=(e.origAmt||e.amount).toString();fCur=e.origCur||"AED";fCat=e.category;fPaid=e.paidBy;fNote=e.note||"";fDate=e.date;fCo=e.country||"JP";fTF=e.taxFree||false;fRec=e.receipt||null;editKey=key;view="add";render()}
function delExp(key){if(confirm("Delete?")){db.ref(dbPath()+"/"+key).remove();flash("Deleted","del");if(view==="detail"){view="home";render()}}}
function captureReceipt(mode){var inp=document.createElement("input");inp.type="file";inp.accept="image/*";if(mode==="camera")inp.setAttribute("capture","environment");inp.onchange=function(ev){var f=ev.target.files[0];if(!f)return;var reader=new FileReader();reader.onload=function(e){var img=new Image();img.onload=function(){var M=1600,w=img.width,h=img.height;if(w>M){h*=M/w;w=M}if(h>M){w*=M/h;h=M}var c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);fRec=c.toDataURL("image/jpeg",0.85);render()};img.src=e.target.result};reader.readAsDataURL(f)};inp.click()}
function openTranslate(){window.open("https://translate.google.com/?sl=ja&tl=en&op=images","_blank")}
function showReceipt(src){if(!src)return;var ov=document.createElement("div");ov.className="r-modal";ov.onclick=function(){ov.remove()};ov.innerHTML='<button class="r-close" onclick="event.stopPropagation();this.parentElement.remove()">✕</button><img src="'+src+'">';document.body.appendChild(ov)}
function exportCSV(){var f=filtered(),csv="Date,Category,Amount,Currency,AED,PaidBy,"+(appMode==="travel"?"Country,TaxFree,":"")+"Note\n";f.forEach(function(e){var cat=gc(e.category);csv+=e.date+","+cat.name+","+(e.origAmt||e.amount)+","+(e.origCur||"AED")+","+e.amount.toFixed(2)+","+e.paidBy+","+(appMode==="travel"?((TAX[e.country]||{}).name||"")+","+(e.taxFree?"Y":"N")+",":"")+'"'+(e.note||"")+"\"\n"});var b=new Blob([csv],{type:"text/csv"}),a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=(appMode==="travel"?"travel":"home")+"-"+selMo+".csv";a.click();flash("Exported!")}

// ─── Pickers ───
function showPicker(title,items,current,onSelect,searchable){
  var ov=document.createElement("div");ov.className="ov";ov.onclick=function(){ov.remove()};
  var box=document.createElement("div");box.className="cpick";box.onclick=function(e){e.stopPropagation()};
  box.innerHTML='<div style="font-weight:700;font-size:16px;margin-bottom:12px">'+title+'</div>'+(searchable?'<input class="fi" type="text" placeholder="Search..." id="pkSearch" style="margin-bottom:10px;padding:10px 14px">':'')+'<div id="pkList" style="max-height:50vh;overflow-y:auto"></div>';
  ov.appendChild(box);document.body.appendChild(ov);
  function rl(q){var list=document.getElementById("pkList");list.innerHTML="";
    var filtered=items;if(q)filtered=items.filter(function(i){return i.label.toLowerCase().indexOf(q.toLowerCase())>=0});
    filtered.forEach(function(item){
      var b=document.createElement("button");
      b.style.cssText="width:100%;display:flex;align-items:center;gap:12px;padding:12px;border-radius:12px;border:1.5px solid "+(current===item.id?"var(--gd)":"rgba(255,255,255,0.04)")+";background:"+(current===item.id?"rgba(242,201,76,0.06)":"var(--cd)")+";cursor:pointer;margin-bottom:6px;text-align:left;color:var(--tx);font-family:'DM Sans',sans-serif";
      b.innerHTML=item.html+(current===item.id?'<span style="margin-left:auto;color:var(--gd)">✓</span>':'');
      b.onclick=function(){onSelect(item.id);ov.remove();render()};list.appendChild(b)});
    if(!filtered.length)list.innerHTML='<div style="text-align:center;padding:20px;color:var(--t2)">No match</div>'}
  rl("");
  if(searchable)setTimeout(function(){var i=document.getElementById("pkSearch");if(i){i.focus();i.oninput=function(){rl(i.value)}}},100);
}
function showCurPicker(){var items=PRI.concat(Object.keys(CUR).filter(function(c){return PRI.indexOf(c)<0}).sort()).map(function(k){return{id:k,label:k+" "+CUR[k].n,html:'<span style="font-size:18px">'+CUR[k].f+'</span><div><div style="font-weight:600;font-size:13px">'+k+'</div><div style="font-size:10px;color:var(--t2)">'+CUR[k].n+'</div></div>'}});showPicker("Display Currency",items,dCur,function(v){dCur=v},true)}
function showCurPickerForm(){var items=PRI.concat(Object.keys(CUR).filter(function(c){return PRI.indexOf(c)<0}).sort()).map(function(k){return{id:k,label:k+" "+CUR[k].n,html:'<span style="font-size:18px">'+CUR[k].f+'</span><div><div style="font-weight:600;font-size:13px">'+k+'</div><div style="font-size:10px;color:var(--t2)">'+CUR[k].n+'</div></div>'}});showPicker("Currency",items,fCur,function(v){fCur=v},true)}
function showCountryPicker(){var items=Object.keys(TAX).map(function(k){var c=TAX[k];return{id:k,label:c.name,html:'<span style="font-size:22px">'+c.flag+'</span><div><div style="font-weight:600;font-size:13px">'+c.name+'</div><div style="font-size:10px;color:var(--t2)">'+(c.rate>0?c.rate+'% refund':'No refund')+'</div></div>'}});showPicker("Country",items,fCo,function(v){fCo=v;if(TAX[v]&&TAX[v].rate===0)fTF=false},true)}
function showCategoryPicker(){var items=CATS.map(function(c){return{id:c.id,label:c.name,html:'<span style="font-size:20px;width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;background:'+c.color+'15">'+c.icon+'</span><span style="font-weight:600;font-size:13px">'+c.name+'</span>'}});showPicker("Category",items,fCat,function(v){fCat=v},false)}
function showTaxCountryPicker(){var items=Object.keys(TAX).map(function(k){var c=TAX[k];return{id:k,label:c.name,html:'<span style="font-size:22px">'+c.flag+'</span><div><div style="font-weight:600;font-size:13px">'+c.name+'</div><div style="font-size:10px;color:var(--t2)">'+(c.rate>0?c.rate+'%':'No refund')+'</div></div>'}});showPicker("Country",items,tCo,function(v){tCo=v},true)}
function showMonthPicker(){
  var ov=document.createElement("div");ov.className="ov";ov.onclick=function(){ov.remove()};
  var box=document.createElement("div");box.className="cpick";box.onclick=function(e){e.stopPropagation()};
  var months=[];var now=new Date();
  for(var i=-6;i<=2;i++){var d=new Date(now.getFullYear(),now.getMonth()+i,1);months.push(gmk(d))}
  allMonths().forEach(function(m){if(months.indexOf(m)<0)months.push(m)});
  months.sort().reverse();
  var unique=[];months.forEach(function(m){if(unique.indexOf(m)<0)unique.push(m)});
  box.innerHTML='<div style="font-weight:700;font-size:16px;margin-bottom:14px">Select Month</div><div id="moList" style="max-height:60vh;overflow-y:auto"></div>';
  ov.appendChild(box);document.body.appendChild(ov);
  var list=document.getElementById("moList");
  unique.forEach(function(m){
    var monthTotal=0;var itemCount=0;
    expList().forEach(function(e){if(gmk(new Date(e.date))===m){monthTotal+=e.amount;itemCount++}});
    var isNow=m===gmk(new Date());
    var btn=document.createElement("button");
    btn.style.cssText="width:100%;display:flex;align-items:center;justify-content:space-between;padding:13px 14px;border-radius:12px;border:1.5px solid "+(selMo===m?"var(--gd)":"rgba(255,255,255,0.04)")+";background:"+(selMo===m?"rgba(242,201,76,0.06)":"var(--cd)")+";cursor:pointer;margin-bottom:6px;text-align:left;color:var(--tx);font-family:'DM Sans',sans-serif";
    var left='<span style="font-size:15px;font-weight:600">'+gml(m)+'</span>'+(isNow?'<span style="font-size:9px;padding:2px 6px;border-radius:4px;background:rgba(78,205,196,0.15);color:var(--tl);font-weight:600">NOW</span>':'');
    var right='';
    if(itemCount>0)right='<div style="text-align:right"><div style="font-size:13px;font-weight:600">'+disp(monthTotal)+'</div><div style="font-size:10px;color:var(--t2)">'+itemCount+' item'+(itemCount!==1?'s':'')+'</div></div>';
    else if(selMo===m)right='<span style="color:var(--gd)">✓</span>';
    btn.innerHTML='<div style="display:flex;align-items:center;gap:8px">'+left+'</div>'+right;
    btn.onclick=function(){selMo=m;ov.remove();render()};
    list.appendChild(btn);
  });
}

// ─── Render ───
function render(){
  var app=document.getElementById("app");
  if(sessionStorage.getItem(PK)!=="yes"){app.innerHTML='<div class="lock"><h1>Family Expense</h1><p>Enter PIN</p><input type="password" inputmode="numeric" maxlength="6" placeholder="••••" id="pinI" onkeydown="if(event.key===\'Enter\')checkPin()"><button onclick="checkPin()">Unlock</button><div class="err" id="pinE"></div></div>';setTimeout(function(){var i=document.getElementById("pinI");if(i)i.focus()},100);return}
  var h="";
  if(view==="home")h=buildHome();
  else if(view==="add")h=buildAdd();
  else if(view==="detail")h=buildDetail();
  else if(view==="stats")h=buildStats();
  else if(view==="tax")h=buildTax();
  else if(view==="categories")h=buildCats();
  else h=buildHome();
  // Mode switcher + Nav combined
  var navItems=[{v:"home",i:"📋",l:"Home"},{v:"stats",i:"📊",l:"Stats"},{v:"add",i:"+",l:"",m:1}];
  if(appMode==="travel")navItems.push({v:"tax",i:"🏷️",l:"Tax"});
  navItems.push({v:"categories",i:"⚙️",l:"More"});
  h+='<div class="bnav" style="flex-direction:column;gap:0;padding:0"><div style="display:flex;gap:4px;padding:6px 16px 4px;width:100%"><button class="mode-btn'+(appMode==="travel"?" on":"")+'" onclick="switchMode(\'travel\')" style="flex:1;padding:6px 10px;border-radius:8px;border:none;background:'+(appMode==="travel"?"var(--cd2)":"transparent")+';color:'+(appMode==="travel"?"var(--tx)":"var(--t3)")+';font-size:11px;font-weight:600;cursor:pointer">✈️ Travel</button><button class="mode-btn'+(appMode==="home"?" on":"")+'" onclick="switchMode(\'home\')" style="flex:1;padding:6px 10px;border-radius:8px;border:none;background:'+(appMode==="home"?"var(--cd2)":"transparent")+';color:'+(appMode==="home"?"var(--tx)":"var(--t3)")+';font-size:11px;font-weight:600;cursor:pointer">🏠 Home</button></div><div style="display:flex;gap:2px;padding:2px 12px 16px;padding-bottom:env(safe-area-inset-bottom,16px);width:100%">'+navItems.map(function(n){return'<button class="'+(n.m?"nb add-main":"nb"+(view===n.v?" on":""))+'" onclick="'+(n.v==="add"?"resetForm();":"")+"view='"+n.v+"';render()\"><span class=\"ni\">"+n.i+"</span>"+n.l+"</button>"}).join("")+'</div></div>';
  app.innerHTML=h;
}
function checkPin(){var i=document.getElementById("pinI");if(i&&i.value===PIN){sessionStorage.setItem(PK,"yes");render()}else{var e=document.getElementById("pinE");if(e)e.textContent="Wrong PIN"}}

function buildHome(){
  var f=filtered(),tot=f.reduce(function(s,e){return s+e.amount},0);
  var byP=PEOPLE.map(function(p){return{name:p,total:f.filter(function(e){return e.paidBy===p}).reduce(function(s,e){return s+e.amount},0)}});
  var isTravel=appMode==="travel";
  var h='<div class="hdr"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><h1>Family Expense</h1><p>'+(isTravel?"✈️ Travel Mode":"🏠 Home Mode")+' <span class="sync-dot" style="display:inline-block;width:7px;height:7px;border-radius:50%;background:'+(syncStatus==="synced"?"#2D9C5A":"#E07B4C")+';margin-left:4px;vertical-align:middle"></span></p></div><button class="ct" onclick="showCurPicker()">'+CUR[dCur].f+' '+dCur+' ▾</button></div>';
  // Mode switcher
  h+='</div></div>';
  // Month dropdown
  h+='<div style="padding:0 20px 10px"><button class="fi" style="text-align:left;cursor:pointer;display:flex;align-items:center;justify-content:space-between" onclick="showMonthPicker()"><span style="display:flex;align-items:center;gap:8px"><span style="font-size:16px">📅</span><span style="font-weight:600">'+gml(selMo)+'</span></span><span style="opacity:.3">▾</span></button></div>';
  // Summary
  h+='<div class="cg"><div class="card hero" style="grid-column:1/-1"><div class="lbl">Total · '+gml(selMo)+'</div><div class="val">'+disp(tot)+'</div>'+(dCur!=="AED"?'<div style="font-size:11px;color:var(--t2);margin-top:2px">'+fmt(tot,"AED")+'</div>':'')+'</div></div>';
  h+='<div class="cg c3">'+byP.map(function(p){return'<div class="card"><div class="lbl">'+pIcon(p.name)+' '+p.name+'</div><div class="val" style="font-size:14px;color:'+pColor(p.name)+'">'+disp(p.total)+'</div></div>'}).join('')+'</div>';
  // List
  h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:2px 20px 4px"><div class="sec" style="padding:0">'+f.length+' item'+(f.length!==1?"s":"")+'</div><button class="ibtn" onclick="exportCSV()">📤 Export</button></div><div class="el">';
  if(!f.length)h+='<div class="empty"><div class="eI">'+(isTravel?"✈️":"🏠")+'</div><p>No expenses yet.<br>Tap + to start!</p></div>';
  else f.forEach(function(e){var cat=gc(e.category),co=TAX[e.country]||{flag:"",name:""};h+='<div class="eitem" onclick="detailKey=\''+e._key+'\';view=\'detail\';render()"><div class="eico" style="background:'+cat.color+'15">'+cat.icon+'</div><div class="einfo"><div class="enm">'+cat.name+(e.taxFree?'<span class="tbdg">TAX FREE</span>':'')+(e.receipt?'<span class="rdot"></span>':'')+'</div><div class="emt">'+(isTravel&&co.flag?'<span>'+co.flag+'</span>':'')+'<span>'+new Date(e.date).toLocaleDateString("en-GB",{day:"numeric",month:"short"})+'</span><span style="color:'+pColor(e.paidBy)+'">'+e.paidBy+'</span>'+(e.origCur&&e.origCur!=="AED"?'<span style="opacity:.5">'+fmt(e.origAmt,e.origCur)+'</span>':'')+(e.note?'<span style="opacity:.5">· '+e.note+'</span>':'')+'</div></div><div class="eamt">'+disp(e.amount)+'</div></div>'});
  h+='</div>';return h;
}

function buildDetail(){

  var cat=gc(e.category),co=TAX[e.country]||{flag:"",name:"",rate:0,notes:""},isTravel=appMode==="travel";
  var dateStr=new Date(e.date).toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
  var h='<div style="padding:20px 20px 0"><button class="back" onclick="view=\'home\';render()">← Back</button></div>';
  h+='<div class="detail"><div class="detail-hero"><div style="width:56px;height:56px;border-radius:16px;background:'+cat.color+'20;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 12px">'+cat.icon+'</div><div class="detail-amt">'+disp(e.amount)+'</div>';
  if(e.origCur&&e.origCur!=="AED")h+='<div style="font-size:14px;color:var(--t2);margin-top:4px">'+fmt(e.origAmt,e.origCur)+'</div>';

  // Info rows
  h+='<div class="detail-row"><div class="dr-icon">📁</div><div><div class="dr-label">Category</div><div class="dr-value">'+cat.icon+' '+cat.name+'</div></div></div>';

  if(e.note)h+='<div class="detail-row"><div class="dr-icon">📝</div><div><div class="dr-label">Note</div><div class="dr-value">'+e.note+'</div></div></div>';
  if(e.receipt)h+='<div class="detail-row" style="flex-direction:column;align-items:stretch;gap:8px"><div style="display:flex;align-items:center;gap:8px"><div style="font-size:20px">🧾</div><div class="dr-label" style="margin:0">Receipt</div></div><img src="'+e.receipt+'" style="width:100%;border-radius:10px;cursor:pointer;max-height:200px;object-fit:cover" onclick="showReceipt(expenses[\''+detailKey+'\'].receipt)"><button style="width:100%;padding:8px;border-radius:8px;border:none;background:rgba(78,205,196,0.12);color:var(--tl);font-weight:600;font-size:12px;cursor:pointer" onclick="openTranslate()">🌐 Translate Receipt</button></div>';
  // Actions

  return h;

function buildAdd(){
  var curC=CUR[fCur]||CUR.AED,catObj=gc(fCat),coObj=TAX[fCo]||{flag:"🌍",name:"Select",rate:0,notes:""},isTravel=appMode==="travel";
  var dateObj=new Date(fDate),dateLabel=dateObj.toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"});
  var h='<div class="frm" style="padding-top:24px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px"><h2 style="font-size:20px;font-weight:700">'+(editKey?"Edit":"New Expense")+'</h2><button class="back" onclick="resetForm();view=\'home\';render()">Cancel</button></div>';
  // Amount
  h+='<div class="fg"><label class="fl">Amount</label><div style="display:flex;gap:8px"><button class="fi" style="width:88px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:3px;padding:12px 8px;font-size:13px;font-weight:600" onclick="showCurPickerForm()">'+curC.f+' '+fCur+' <span style="opacity:.3;font-size:9px">▾</span></button><input class="fi" style="flex:1;font-size:22px;font-weight:700;font-family:Fraunces,serif" type="number" inputmode="decimal" placeholder="0.00" value="'+fAmt+'" oninput="fAmt=this.value"></div>'+(fCur!=="AED"&&fAmt?'<div style="text-align:right;font-size:11px;color:var(--t2);margin-top:3px">≈ '+fmt(toAED(parseFloat(fAmt),fCur),"AED")+'</div>':'')+'</div>';
  // Country (travel only)
  if(isTravel)h+='<div class="fg"><label class="fl">Country</label><button class="fi" style="text-align:left;cursor:pointer;display:flex;align-items:center;justify-content:space-between" onclick="showCountryPicker()"><span style="display:flex;align-items:center;gap:8px"><span style="font-size:18px">'+coObj.flag+'</span>'+coObj.name+'</span><span style="opacity:.3">▾</span></button></div>';
  // Category
  h+='<div class="fg"><label class="fl">Category</label><button class="fi" style="text-align:left;cursor:pointer;display:flex;align-items:center;justify-content:space-between" onclick="showCategoryPicker()"><span style="display:flex;align-items:center;gap:8px">'+(fCat?'<span style="font-size:16px">'+catObj.icon+'</span>'+catObj.name:'<span style="color:var(--t2)">Select category</span>')+'</span><span style="opacity:.3">▾</span></button></div>';
  // Paid By
  h+='<div class="fg"><label class="fl">Paid By</label><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px">';
  PEOPLE.forEach(function(p){var on=fPaid===p;h+='<button class="perb'+(on?" on":"")+'" style="'+(on?"border-color:"+pColor(p):"" )+'" onclick="fPaid=\''+p+'\';render()">'+pIcon(p)+' '+p+'</button>'});
  h+='</div></div>';
  // Tax (travel only)
  if(isTravel){if(coObj.rate>0){h+='<div class="fg"><div class="trow'+(fTF?" trow-on":"")+'" onclick="fTF=!fTF;render()"><div><div style="font-weight:600;font-size:13px">'+(fTF?'✅ Claiming Tax Refund':'🏷️ Claim Tax Refund?')+'</div><div style="font-size:10px;color:var(--tl);margin-top:2px">'+coObj.flag+' '+coObj.name+' · '+coObj.rate+'%</div>';if(fTF&&fAmt){var r=parseFloat(fAmt)*coObj.rate/(100+coObj.rate);h+='<div style="font-size:12px;color:var(--tl);margin-top:4px;font-weight:700">Get back ≈ '+curC.f+' '+r.toFixed(2)+'</div>'}h+='</div><div class="ttk'+(fTF?" on":"")+'"><div class="tkn"></div></div></div></div>'}else{h+='<div class="fg"><div style="padding:12px;background:var(--cd);border-radius:11px;border:1px solid rgba(255,107,107,0.12)"><span style="font-weight:600;font-size:13px;color:var(--cr)">❌ No Tax Refund</span><span style="font-size:10px;color:var(--t2);margin-left:6px">'+coObj.name+'</span></div></div>'}}
  // Date
  h+='<div class="fg"><label class="fl">Date</label><div style="position:relative"><input class="fi" type="date" value="'+fDate+'" onchange="fDate=this.value;render()" style="opacity:0;position:absolute;top:0;left:0;width:100%;height:100%;cursor:pointer"><button class="fi" style="text-align:left;cursor:pointer;display:flex;align-items:center;justify-content:space-between;pointer-events:none"><span>'+dateLabel+'</span><span style="opacity:.4">📅</span></button></div></div>';
  // Note
  h+='<div class="fg"><label class="fl">Note</label><input class="fi" type="text" placeholder="e.g. Don Quijote Shibuya" value="'+(fNote||'')+'" oninput="fNote=this.value"></div>';
  // Receipt
  h+='<div class="fg"><label class="fl">Receipt</label>';
  if(fRec)h+='<img src="'+fRec+'" class="rprev"><div style="display:flex;gap:6px;margin-top:6px"><button style="flex:1;padding:7px;border-radius:9px;border:none;background:rgba(78,205,196,0.12);color:var(--tl);font-weight:600;font-size:11px;cursor:pointer" onclick="openTranslate()">🌐 Translate</button><button style="flex:1;padding:7px;border-radius:9px;border:none;background:rgba(255,107,107,0.12);color:var(--cr);font-weight:600;font-size:11px;cursor:pointer" onclick="fRec=null;render()">✕ Remove</button></div>';
  else h+='<div class="rbtns"><button class="rbtn" onclick="captureReceipt(\'camera\')">📸 Camera</button><button class="rbtn" onclick="captureReceipt(\'file\')">📁 Upload</button></div>';
  h+='</div><button class="submit" '+(!fAmt||!fCat?"disabled":"")+' onclick="submitExp()">💾 '+(editKey?"Update":"Add Expense")+'</button></div>';
  return h;
}

function buildStats(){
  var f=filtered(),tot=f.reduce(function(s,e){return s+e.amount},0),isTravel=appMode==="travel";
  var byP=PEOPLE.map(function(p){return{name:p,total:f.filter(function(e){return e.paidBy===p}).reduce(function(s,e){return s+e.amount},0)}});
  var byC=CATS.map(function(c){return{id:c.id,icon:c.icon,name:c.name,color:c.color,total:f.filter(function(e){return e.category===c.id}).reduce(function(s,e){return s+e.amount},0)}}).filter(function(c){return c.total>0}).sort(function(a,b){return b.total-a.total});
  function bar(l,v,p,c){return'<div class="bi"><div class="bh"><span class="bl">'+l+'</span><span class="bv">'+v+'</span></div><div class="bt"><div class="bf" style="width:'+p+'%;background:'+c+'"></div></div></div>'}
  var h='<div class="hdr"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><h1>Statistics</h1><p>'+(isTravel?"✈️ Travel":"🏠 Home")+'</p></div><button class="ct" onclick="showCurPicker()">'+CUR[dCur].f+' '+dCur+' ▾</button></div></div>';
  h+='<div style="padding:0 20px 10px"><button class="fi" style="text-align:left;cursor:pointer;display:flex;align-items:center;justify-content:space-between" onclick="showMonthPicker()"><span style="display:flex;align-items:center;gap:8px"><span style="font-size:16px">📅</span><span style="font-weight:600">'+gml(selMo)+'</span></span><span style="opacity:.3">▾</span></button></div>';
  h+='<div class="cg"><div class="card hero"><div class="lbl">Month Total</div><div class="val">'+disp(tot)+'</div>'+(dCur!=="AED"?'<div style="font-size:11px;color:var(--t2);margin-top:2px">'+fmt(tot,"AED")+'</div>':'')+'</div></div>';
  h+='<div class="sec">By Category</div>';
  if(!byC.length)h+='<div class="empty"><p>No data</p></div>';else byC.forEach(function(c){h+=bar(c.icon+" "+c.name,disp(c.total)+" ("+(tot?Math.round(c.total/tot*100):0)+"%)",tot?c.total/tot*100:0,c.color)});
  h+='<div class="sec" style="margin-top:6px">By Person</div>';byP.forEach(function(p){h+=bar(pIcon(p.name)+" "+p.name,disp(p.total),tot?p.total/tot*100:0,pColor(p.name))});
  return h;
}

function buildTax(){
  var all=expList(),tCD=TAX[tCo],tEl=all.filter(function(e){return e.country===tCo&&e.taxFree}),tTot=tEl.reduce(function(s,e){return s+e.amount},0),tRef=tTot*(tCD?tCD.rate:0)/(100+(tCD?tCD.rate:0));
  var grandRef=0,allTC={};for(var k in TAX){var el=all.filter(function(e){return e.country===k&&e.taxFree});var tot=el.reduce(function(s,e){return s+e.amount},0);grandRef+=tot*TAX[k].rate/(100+TAX[k].rate);if(el.length)allTC[k]=el.length}
  var h='<div class="hdr"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><h1>Tax Refund</h1><p>Eligible refunds</p></div><button class="ct" onclick="showCurPicker()">'+CUR[dCur].f+' '+dCur+' ▾</button></div></div>';
  h+='<div style="display:flex;gap:6px;padding:0 20px 10px"><button class="tab'+(tMode==="calc"?" on":"")+'" onclick="tMode=\'calc\';render()">Calculator</button><button class="tab'+(tMode==="all"?" on":"")+'" onclick="tMode=\'all\';render()">All Countries</button></div>';
  if(tMode==="calc"){
    h+='<div style="padding:0 20px 10px"><button class="fi" style="text-align:left;cursor:pointer;display:flex;align-items:center;justify-content:space-between" onclick="showTaxCountryPicker()"><span style="display:flex;align-items:center;gap:8px"><span style="font-size:18px">'+(tCD?tCD.flag:'')+'</span><span style="font-weight:600">'+(tCD?tCD.name:'')+'</span><span style="color:var(--t2);font-size:11px">'+(tCD?tCD.rate+'%':'')+'</span></span><span style="opacity:.3">▾</span></button></div>';
    h+='<div class="tcard">';if(tCD&&tCD.rate>0){h+='<div class="lbl">Estimated Refund</div><div class="trbig">'+disp(tRef)+'</div><div style="font-size:11px;color:var(--t2)">'+tEl.length+' item'+(tEl.length!==1?'s':'')+' · '+disp(tTot)+' total</div><div style="display:flex;gap:10px;margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.04)"><div style="flex:1"><div class="lbl">Rate</div><div style="font-size:16px;font-weight:700;margin-top:3px">'+tCD.rate+'%</div></div><div style="flex:1"><div class="lbl">Items</div><div style="font-size:16px;font-weight:700;margin-top:3px">'+tEl.length+'</div></div><div style="flex:1"><div class="lbl">Spent</div><div style="font-size:16px;font-weight:700;margin-top:3px">'+disp(tTot)+'</div></div></div>'}else{h+='<div style="text-align:center;padding:6px 0"><div style="font-size:24px;margin-bottom:6px">❌</div><div style="font-weight:600;color:var(--cr)">No Tax Refund</div></div>'}
    h+='<div class="tibox">ℹ️ '+(tCD?tCD.notes:'')+'</div></div>';
    if(tEl.length){h+='<div class="sec">Eligible</div><div class="el">';tEl.sort(function(a,b){return new Date(b.date)-new Date(a.date)}).forEach(function(e){var cat=gc(e.category),rf=e.amount*tCD.rate/(100+tCD.rate);h+='<div class="eitem" onclick="detailKey=\''+e._key+'\';view=\'detail\';render()"><div class="eico" style="background:'+cat.color+'15">'+cat.icon+'</div><div class="einfo"><div class="enm">'+cat.name+'</div><div class="emt"><span>'+new Date(e.date).toLocaleDateString("en-GB",{day:"numeric",month:"short"})+'</span><span>·</span><span>'+disp(e.amount)+'</span></div></div><div class="eamt" style="color:var(--tl)">+'+disp(rf)+'</div></div>'});h+='</div>'}
  }else{
    var tcK=Object.keys(allTC);
    h+='<div class="tcard"><div class="lbl">Total Refund — All Countries</div><div class="trbig">'+disp(grandRef)+'</div><div style="font-size:11px;color:var(--t2)">'+tcK.length+' countr'+(tcK.length===1?'y':'ies')+'</div></div><div class="sec">By Country</div><div style="padding:0 20px">';
    if(!tcK.length)h+='<div class="empty"><div class="eI">🏷️</div><p>No tax-free purchases yet</p></div>';
    else for(var k in TAX){var el=all.filter(function(e){return e.country===k&&e.taxFree});if(!el.length)continue;var tot=el.reduce(function(s,e){return s+e.amount},0),rf=tot*TAX[k].rate/(100+TAX[k].rate);h+='<div class="tcitem" onclick="tCo=\''+k+'\';tMode=\'calc\';render()"><span style="font-size:26px">'+TAX[k].flag+'</span><div style="flex:1"><div style="font-weight:600;font-size:13px">'+TAX[k].name+'</div><div style="font-size:10px;color:var(--t2)">'+el.length+' items · '+TAX[k].rate+'%</div></div><div style="font-weight:700;font-size:13px;color:var(--tl)">+'+disp(rf)+'</div></div>'}
    h+='</div>';
  }
  return h;
}

function buildCats(){
  var h='<div style="padding:24px 20px 20px"><h2 style="font-size:20px;font-weight:700;margin-bottom:16px">Settings</h2>';
  h+='<div class="sec" style="padding:0 0 6px">Categories</div>';
  CATS.forEach(function(c){h+='<div class="cmitem"><span style="font-size:18px">'+c.icon+'</span><span style="font-weight:500;font-size:12px">'+c.name+'</span><span style="width:10px;height:10px;border-radius:3px;background:'+c.color+';margin-left:auto"></span></div>'});
  h+='<div class="sec" style="padding:16px 0 6px">Exchange Rates</div><div style="font-size:10px;color:var(--t2);margin-bottom:6px">Approx rates vs 1 AED</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:4px">';
  for(var k in CUR)h+='<div style="padding:7px 9px;background:var(--cd);border-radius:8px;font-size:11px;display:flex;justify-content:space-between;border:1px solid rgba(255,255,255,0.02)"><span>'+CUR[k].f+' '+k+'</span><span style="color:var(--t2)">'+(CUR[k].r===1?"Base":CUR[k].r)+'</span></div>';
  h+='</div></div>';return h;
}
render();
}// end else firebase check
</script>
