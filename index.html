<style>

.ibtn{padding:8px 14px;border-radius:10px;border:1px solid rgba(242,201,76,0.2);background:transparent;color:var(--gd);font-weight:600;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px}
.back{background:none;border:none;color:var(--t2);cursor:pointer;font-size:13px}
.ct{padding:7px 12px;border-radius:10px;border:1px solid rgba(242,201,76,0.2);background:rgba(242,201,76,0.06);color:var(--gd);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;position:relative;z-index:1}
.cpick{background:var(--cd2);border-radius:var(--r);padding:24px;max-width:360px;width:100%;max-height:80vh;overflow-y:auto;border:1px solid rgba(255,255,255,0.06)}.clist{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.copt{padding:10px;border-radius:10px;border:1.5px solid rgba(255,255,255,0.05);background:var(--cd);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .15s}.copt.on{border-color:var(--gd);background:rgba(242,201,76,0.08)}
.lock{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px;text-align:center}
.lock h1{font-family:'Fraunces',serif;font-size:32px;background:linear-gradient(135deg,var(--gd),var(--tl));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.lock p{color:var(--t2);font-size:14px;margin-bottom:32px}
.lock input{width:100%;max-width:280px;padding:16px;border-radius:14px;border:2px solid rgba(242,201,76,0.15);background:var(--cd);color:var(--tx);font-size:18px;text-align:center;letter-spacing:4px;outline:none}.lock input:focus{border-color:var(--gd)}
.lock button{margin-top:16px;padding:14px 48px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--gd),#E0B040);color:#0C1520;font-size:15px;font-weight:700;cursor:pointer}
.lock .err{color:var(--cr);font-size:13px;margin-top:12px}
</style>

<script type="module">

import { getDatabase, ref, set, push, remove, onValue } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-database.js";

const db = getDatabase(initializeApp({
  apiKey:"AIzaSyAZrYWr1SSkp5pnVXkJz_gEThunnkKaFxw",
  authDomain:"japan-expense-claude.firebaseapp.com",

// ─── All app code on window ───
var W = window;
W.APP_PIN = "1029";

W.CUR={AED:{s:"AED",n:"UAE Dirham",f:"🇦🇪",r:1},USD:{s:"$",n:"US Dollar",f:"🇺🇸",r:0.2723},PHP:{s:"₱",n:"Philippine Peso",f:"🇵🇭",r:16.53},EUR:{s:"€",n:"Euro",f:"🇪🇺",r:0.2513},GBP:{s:"£",n:"British Pound",f:"🇬🇧",r:0.2118},JPY:{s:"¥",n:"Japanese Yen",f:"🇯🇵",r:43.49},KRW:{s:"₩",n:"Korean Won",f:"🇰🇷",r:393.2},THB:{s:"฿",n:"Thai Baht",f:"🇹🇭",r:8.96},SGD:{s:"S$",n:"Singapore Dollar",f:"🇸🇬",r:0.3514},CNY:{s:"¥",n:"Chinese Yuan",f:"🇨🇳",r:1.883},AUD:{s:"A$",n:"Aus Dollar",f:"🇦🇺",r:0.3975},CHF:{s:"CHF",n:"Swiss Franc",f:"🇨🇭",r:0.2495},TRY:{s:"₺",n:"Turkish Lira",f:"🇹🇷",r:10.42},MYR:{s:"RM",n:"Ringgit",f:"🇲🇾",r:1.10},INR:{s:"₹",n:"Indian Rupee",f:"🇮🇳",r:25.60}};
W.PRI=["AED","USD","PHP"];
W.TAX={JP:{name:"Japan",flag:"🇯🇵",rate:10,notes:"Currently tax-exempt at purchase. From Nov 2026: pay first, refund at airport. 10% goods, 8% food. Min ¥5,000/store/day."},KR:{name:"South Korea",flag:"🇰🇷",rate:10,notes:"Refund at airport/city kiosks. Min ₩15,000. Within 3 months."},TH:{name:"Thailand",flag:"🇹🇭",rate:7,notes:"7% VAT at participating stores. Min ฿2,000/store/day."},SG:{name:"Singapore",flag:"🇸🇬",rate:9,notes:"9% GST via eTRS at airport. Min S$100/store."},FR:{name:"France",flag:"🇫🇷",rate:20,notes:"20% VAT. PABLO kiosks. Min €100.01/store/day."},DE:{name:"Germany",flag:"🇩🇪",rate:19,notes:"19% VAT. Customs stamp. Min €50/store."},IT:{name:"Italy",flag:"🇮🇹",rate:22,notes:"22% VAT — highest major EU. Min €70.01."},ES:{name:"Spain",flag:"🇪🇸",rate:21,notes:"21% VAT. DIVA digital system."},GB:{name:"UK",flag:"🇬🇧",rate:0,notes:"⚠️ No tourist VAT refund since Jan 2021."},AU:{name:"Australia",flag:"🇦🇺",rate:10,notes:"10% GST TRS. Min A$300+/store."},TR:{name:"Turkey",flag:"🇹🇷",rate:20,notes:"20% VAT for non-residents."},MY:{name:"Malaysia",flag:"🇲🇾",rate:10,notes:"10% Sales Tax. Min RM300/store."},CH:{name:"Switzerland",flag:"🇨🇭",rate:8.1,notes:"8.1% VAT. 30 days. Min CHF300."},AE:{name:"UAE",flag:"🇦🇪",rate:5,notes:"5% VAT. Planet app. Min AED 250."},CN:{name:"China",flag:"🇨🇳",rate:13,notes:"13% VAT. Min ¥500."},IN:{name:"India",flag:"🇮🇳",rate:0,notes:"⚠️ No GST refund for tourists."}};
W.CATS=[{id:"groceries",name:"Groceries",icon:"🛒",color:"#2D9C5A"},{id:"dining",name:"Dining Out",icon:"🍽️",color:"#E07B4C"},{id:"bills",name:"Bills & Utilities",icon:"⚡",color:"#5B7FD6"},{id:"transport",name:"Transport",icon:"🚗",color:"#9B6FC3"},{id:"shopping",name:"Shopping",icon:"🛍️",color:"#D65B8A"},{id:"healthcare",name:"Healthcare",icon:"🏥",color:"#4BADA8"},{id:"accommodation",name:"Stay",icon:"🏨",color:"#C4A43B"},{id:"activities",name:"Activities",icon:"🎯",color:"#E05555"},{id:"souvenirs",name:"Souvenirs",icon:"🎁",color:"#7C6FB0"}];
W.PEOPLE=["Renzo","Mimi","Others"];
W.toAED=function(a,c){return a/(CUR[c]?CUR[c].r:1)};
W.fromAED=function(a,c){return a*(CUR[c]?CUR[c].r:1)};
W.fmt=function(a,c){c=c||"AED";var C=CUR[c],v=Number(a||0);if(c==="JPY"||c==="KRW")return C.s+" "+Math.round(v).toLocaleString();return C.s+" "+v.toLocaleString("en",{minimumFractionDigits:2,maximumFractionDigits:2})};

W.fAmt="";W.fCur="AED";W.fCat="";W.fPaid=PEOPLE[0];W.fNote="";W.fDate=new Date().toISOString().slice(0,10);W.fCo="JP";W.fTF=false;W.fRec=null;

// Firebase listeners
onValue(ref(db,"expenses"),function(snap){expenses=snap.val()||{};syncStatus="synced";render()});

function buildStats(){
  var f=filtered(),tot=f.reduce(function(s,e){return s+e.amount},0);
  var byP=PEOPLE.map(function(p){return{name:p,total:f.filter(function(e){return e.paidBy===p}).reduce(function(s,e){return s+e.amount},0)}});

  function bar(l,v,p,c){return'<div class="bi"><div class="bh"><span class="bl">'+l+'</span><span class="bv">'+v+'</span></div><div class="bt"><div class="bf" style="width:'+p+'%;background:'+c+'"></div></div></div>'}
  var h='<div class="hdr"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><h1>Statistics</h1><p>Breakdown</p></div><button class="ct" onclick="showCurPicker()">'+CUR[dCur].f+' '+dCur+' ▾</button></div></div><div class="hs">';
  allMonths().forEach(function(m){h+='<button class="pill'+(m===selMo?" on":"")+'" onclick="selMo=\''+m+'\';render()">'+gml(m)+'</button>'});
  h+='</div><div class="cg"><div class="card hero"><div class="lbl">Month Total</div><div class="val">'+disp(tot)+'</div>'+(dCur!=="AED"?'<div style="font-size:12px;color:var(--t2);margin-top:2px">'+fmt(tot,"AED")+'</div>':'')+'</div></div><div class="sec">By Category</div>';
  if(!byC.length)h+='<div class="empty"><p>No data</p></div>';else byC.forEach(function(c){h+=bar(c.icon+" "+c.name,disp(c.total)+" ("+(tot?Math.round(c.total/tot*100):0)+"%)",tot?c.total/tot*100:0,c.color)});
  h+='<div class="sec" style="margin-top:8px">By Person</div>';byP.forEach(function(p){var ic=p.name==="Renzo"?"👤":p.name==="Mimi"?"👩":"👥";var cl=p.name==="Renzo"?"var(--gd)":p.name==="Mimi"?"var(--tl)":"#9B6FC3";h+=bar(ic+" "+p.name,disp(p.total),tot?p.total/tot*100:0,cl)});
  return h;
}

function buildTax(){
  var all=expList(),tCD=TAX[tCo],tEl=all.filter(function(e){return e.country===tCo&&e.taxFree}),tTot=tEl.reduce(function(s,e){return s+e.amount},0),tRef=tTot*(tCD?tCD.rate:0)/(100+(tCD?tCD.rate:0));
  var grandRef=0,allTC={};for(var k in TAX){var el=all.filter(function(e){return e.country===k&&e.taxFree});var tot=el.reduce(function(s,e){return s+e.amount},0);grandRef+=tot*TAX[k].rate/(100+TAX[k].rate);if(el.length)allTC[k]=el.length}
  var h='<div class="hdr"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><h1>Tax Refund</h1><p>Eligible refunds</p></div><button class="ct" onclick="showCurPicker()">'+CUR[dCur].f+' '+dCur+' ▾</button></div></div>';
  h+='<div style="display:flex;gap:6px;padding:0 20px 12px"><button class="tab'+(tMode==="calc"?" on":"")+'" onclick="tMode=\'calc\';render()">Calculator</button><button class="tab'+(tMode==="all"?" on":"")+'" onclick="tMode=\'all\';render()">All Countries</button></div>';
  if(tMode==="calc"){
    h+='<div class="hs">';for(var k in TAX)h+='<button class="pill'+(tCo===k?" on":"")+'" onclick="tCo=\''+k+'\';render()">'+TAX[k].flag+' '+TAX[k].name+'</button>';h+='</div>';
    h+='<div class="tcard"><div style="display:flex;align-items:center;gap:12px;margin-bottom:14px"><span style="font-size:36px">'+(tCD?tCD.flag:'')+'</span><div><div style="font-weight:700;font-size:18px">'+(tCD?tCD.name:'')+'</div><div style="font-size:12px;color:var(--t2)">Tax: '+(tCD?tCD.rate:0)+'%</div></div></div><div style="font-size:12px;color:var(--t2)"><strong>Tax-free items:</strong> '+tEl.length+' · '+disp(tTot)+'</div><div class="trbig">'+(tCD&&tCD.rate>0?disp(tRef):'No refund')+'</div><div style="font-size:12px;color:var(--t2)">'+(tCD&&tCD.rate>0?'Est. '+tCD.rate+'% refund':'No tourist refunds.')+'</div><div class="tibox">ℹ️ '+(tCD?tCD.notes:'')+'</div></div>';
    if(tEl.length){h+='<div class="sec">Eligible</div><div class="el">';tEl.sort(function(a,b){return new Date(b.date)-new Date(a.date)}).forEach(function(e){var cat=gc(e.category),rf=e.amount*tCD.rate/(100+tCD.rate);h+='<div class="eitem"><div class="eico" style="background:'+cat.color+'15">'+cat.icon+'</div><div class="einfo"><div class="enm">'+cat.name+'</div><div class="emt"><span>'+new Date(e.date).toLocaleDateString("en-GB",{day:"numeric",month:"short"})+'</span><span>·</span><span>'+disp(e.amount)+'</span></div></div><div class="eamt" style="color:var(--tl)">+'+disp(rf)+'</div></div>'});h+='</div>'}
  }else{
    var tcKeys=Object.keys(allTC);
    h+='<div class="tcard"><div class="lbl">Total Refund — All Countries</div><div class="trbig">'+disp(grandRef)+'</div><div style="font-size:12px;color:var(--t2)">'+tcKeys.length+' countr'+(tcKeys.length===1?'y':'ies')+'</div></div><div class="sec">By Country</div><div style="padding:0 20px">';
    if(!tcKeys.length)h+='<div class="empty"><div class="eI">🏷️</div><p>No tax-free purchases yet</p></div>';
    else for(var k in TAX){var el=all.filter(function(e){return e.country===k&&e.taxFree});if(!el.length)continue;var tot=el.reduce(function(s,e){return s+e.amount},0),rf=tot*TAX[k].rate/(100+TAX[k].rate);h+='<div class="tcitem" onclick="tCo=\''+k+'\';tMode=\'calc\';render()"><span style="font-size:28px">'+TAX[k].flag+'</span><div style="flex:1"><div style="font-weight:600;font-size:14px">'+TAX[k].name+'</div><div style="font-size:11px;color:var(--t2)">'+el.length+' items · '+TAX[k].rate+'%</div></div><div style="font-weight:700;font-size:14px;color:var(--tl)">+'+disp(rf)+'</div></div>'}
    h+='</div>';
  }
  return h;
}

function buildCats(){
  var h='<div style="padding:28px 20px 20px"><h2 style="font-size:20px;font-weight:700;margin-bottom:18px">Categories</h2>';
  categories.forEach(function(c){h+='<div class="cmitem"><span style="font-size:20px">'+c.icon+'</span><span style="font-weight:500;font-size:13px">'+c.name+'</span><span style="width:12px;height:12px;border-radius:3px;background:'+c.color+';margin-left:4px"></span></div>'});
  h+='<div class="sec" style="padding:24px 0 6px">Exchange Rates</div><div style="font-size:11px;color:var(--t2);margin-bottom:8px">Approximate rates vs 1 AED</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">';
  for(var k in CUR)h+='<div style="padding:8px 10px;background:var(--cd);border-radius:10px;font-size:12px;display:flex;justify-content:space-between;border:1px solid rgba(255,255,255,0.02)"><span>'+CUR[k].f+' '+k+'</span><span style="color:var(--t2)">'+(CUR[k].r===1?"Base":CUR[k].r)+'</span></div>';
  h+='</div></div>';return h;
}

// Initial render
render();
</script>
