function render(){
  var app=document.getElementById("app");
  if(sessionStorage.getItem(PIN_KEY)!=="yes"){app.innerHTML='<div class="lock"><h1>Our Expenses</h1><p>Enter PIN to continue</p><input type="password" inputmode="numeric" maxlength="6" placeholder="••••" id="pinI" onkeydown="if(event.key===\'Enter\')checkPin()"><button onclick="checkPin()">Unlock</button><div class="err" id="pinE"></div></div>';setTimeout(function(){var i=document.getElementById("pinI");if(i)i.focus()},100);return}
  if(view==="home")renderHome(app);
  else if(view==="add")renderAdd(app);
  else if(view==="stats")renderStats(app);
  else if(view==="tax")renderTax(app);
  else if(view==="categories")renderCats(app);
  else renderHome(app);
  // Nav
  var nav='<div class="bnav">';
  [{v:"home",i:"📋",l:"Home"},{v:"stats",i:"📊",l:"Stats"},{v:"add",i:"+",l:"",m:1},{v:"tax",i:"🏷️",l:"Tax"},{v:"categories",i:"⚙️",l:"More"}].forEach(function(n){
    var cls=n.m?"nb add-main":"nb"+(view===n.v?" on":"");
    nav+='<button class="'+cls+'" onclick="'+(n.v==="add"?"resetForm();":"")+'view=\''+n.v+'\';render()"><span class="ni">'+n.i+'</span>'+n.l+'</button>';
  });
  nav+='</div>';
  app.insertAdjacentHTML("beforeend",nav);
}

function checkPin(){var i=document.getElementById("pinI");if(i&&i.value===APP_PIN){sessionStorage.setItem(PIN_KEY,"yes");render()}else{var e=document.getElementById("pinE");if(e)e.textContent="Wrong PIN"}}

function renderHome(app){
  var f=filtered(),tot=f.reduce(function(s,e){return s+e.amount},0);
  var byP=PEOPLE.map(function(p){return{name:p,total:f.filter(function(e){return e.paidBy===p}).reduce(function(s,e){return s+e.amount},0)}});
  var html='<div class="hdr"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><h1>Travel Expenses</h1><p>Real-time sync <span class="sync-dot" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:'+(syncStatus==="synced"?"#2D9C5A":"#E07B4C")+';margin-left:6px;vertical-align:middle"></span></p></div><button class="ct" onclick="showCurPicker()">'+CUR[dCur].f+' '+dCur+' ▾</button></div></div>';
  html+='<div class="hs">';
  allMonths().forEach(function(m){html+='<button class="pill'+(m===selMo?" on":"")+'" onclick="selMo=\''+m+'\';render()">'+gml(m)+'</button>'});
  html+='</div>';
  html+='<div class="cg"><div class="card hero" style="grid-column:1/-1"><div class="lbl">Total this month</div><div class="val">'+disp(tot)+'</div>'+(dCur!=="AED"?'<div style="font-size:12px;color:var(--t2);margin-top:2px">'+fmt(tot,"AED")+'</div>':"")+'</div></div>';
  html+='<div class="cg c2">'+byP.map(function(p){return'<div class="card"><div class="lbl">'+(p.name==="Husband"?"🙋‍♂️":"🙋‍♀️")+' '+p.name+'</div><div class="val" style="font-size:16px;color:'+(p.name==="Husband"?"var(--gd)":"var(--tl)")+'">'+disp(p.total)+'</div></div>'}).join("")+'</div>';
  html+='<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 20px 6px"><div class="sec" style="padding:0">'+f.length+' item'+(f.length!==1?"s":"")+'</div><button class="ibtn" onclick="exportCSV()">📤 Export</button></div>';
  html+='<div class="el">';
  if(!f.length)html+='<div class="empty"><div class="eI">✈️</div><p>No expenses yet.<br>Tap + to start!</p></div>';
  else f.forEach(function(e,idx){
    var cat=gc(e.category),co=TAX[e.country]||{flag:"",name:""};
    html+='<div class="eitem"><div class="eico" style="background:'+cat.color+'15">'+cat.icon+'</div><div class="einfo"><div class="enm">'+cat.name+(e.taxFree?'<span class="tbdg">TAX FREE</span>':"")+(e.receipt?'<span class="rdot"></span>':"")+'</div><div class="emt"><span>'+co.flag+'</span><span>'+new Date(e.date).toLocaleDateString("en-GB",{day:"numeric",month:"short"})+'</span><span style="color:'+(e.paidBy==="Husband"?"var(--gd)":"var(--tl)")+'">'+e.paidBy+'</span>'+(e.origCur&&e.origCur!=="AED"?'<span style="opacity:.5">'+fmt(e.origAmt,e.origCur)+'</span>':"")+(e.note?'<span style="opacity:.5">· '+e.note+'</span>':"")+'</div></div><div class="eamt">'+disp(e.amount)+'</div><div class="eacts">'+(e.receipt?'<button class="ab r" onclick="event.stopPropagation();showReceipt(expenses[\''+e._key+'\'].receipt)">🖼</button>':"")+'<button class="ab e" onclick="event.stopPropagation();editExp(\''+e._key+'\')">✏️</button><button class="ab d" onclick="event.stopPropagation();delExp(\''+e._key+'\')">🗑</button></div></div>';
  });
  html+='</div>';
  app.innerHTML=html;
}

function editExp(key){var e=expenses[key];if(!e)return;fAmt=(e.origAmt||e.amount).toString();fCur=e.origCur||"AED";fCat=e.category;fPaid=e.paidBy;fNote=e.note||"";fDate=e.date;fCo=e.country||"JP";fTF=e.taxFree||false;fRec=e.receipt||null;editKey=key;view="add";render()}
function delExp(key){if(confirm("Delete this expense?")){db.ref("expenses/"+key).remove();flash("Deleted","del")}}

function renderAdd(app){
  var allK=Object.keys(CUR),topC=PRI.concat(allK.filter(function(c){return PRI.indexOf(c)<0}).slice(0,5)),restC=allK.filter(function(c){return topC.indexOf(c)<0});
  var html='<div class="frm" style="padding-top:28px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px"><h2 style="font-size:20px;font-weight:700">'+(editKey?"Edit":"New Expense")+'</h2><button class="back" onclick="resetForm();view=\'home\';render()">Cancel</button></div>';
  html+='<div class="fg"><label class="fl">Amount</label><div style="position:relative"><input class="fi big" type="number" inputmode="decimal" placeholder="0.00" id="fAmtI" value="'+fAmt+'" oninput="fAmt=this.value"><div class="cur-row">'+topC.map(function(c){return'<button class="cc'+(fCur===c?" on":"")+'" onclick="fCur=\''+c+'\';render()">'+CUR[c].f+' '+c+'</button>'}).join("")+'</div></div>'+(fCur!=="AED"&&fAmt?'<div style="text-align:center;font-size:13px;color:var(--t2);margin-top:6px">≈ '+fmt(toAED(parseFloat(fAmt),fCur),"AED")+'</div>':'')+'<div class="hs" style="margin-top:6px;padding:0">'+restC.map(function(c){return'<button class="cc'+(fCur===c?" on":"")+'" onclick="fCur=\''+c+'\';render()">'+CUR[c].f+' '+c+'</button>'}).join("")+'</div></div>';
  html+='<div class="fg"><label class="fl">Country</label><div class="hs" style="padding:0">';
  for(var k in TAX)html+='<button class="pill'+(fCo===k?" on":"")+'" onclick="fCo=\''+k+'\';render()" style="display:flex;align-items:center;gap:4px">'+TAX[k].flag+' '+TAX[k].name+'</button>';
  html+='</div></div>';
  html+='<div class="fg"><label class="fl">Category</label><div class="catg">'+categories.map(function(c){return'<button class="catb'+(fCat===c.id?" on":"")+'" onclick="fCat=\''+c.id+'\';render()"><span class="ci">'+c.icon+'</span><span class="cl">'+c.name+'</span></button>'}).join("")+'</div></div>';
  html+='<div class="fg"><label class="fl">Paid By</label><div class="perg">'+PEOPLE.map(function(p){return'<button class="perb'+(fPaid===p?" on":"")+'" onclick="fPaid=\''+p+'\';render()">'+(p==="Husband"?"🙋‍♂️":"🙋‍♀️")+' '+p+'</button>'}).join("")+'</div></div>';
  html+='<div class="fg"><div class="trow'+(fTF?" trow-on":"")+'" onclick="fTF=!fTF;render()"><div><div style="font-weight:600;font-size:14px">🏷️ Tax-Free Purchase</div><div style="font-size:11px;color:var(--t2);margin-top:2px">'+(TAX[fCo]?TAX[fCo].rate:0)+'% refund — '+(TAX[fCo]?TAX[fCo].name:"")+'</div></div><div class="ttk'+(fTF?" on":"")+'"><div class="tkn"></div></div></div></div>';
  html+='<div class="fg"><label class="fl">Date</label><input class="fi" type="date" id="fDateI" value="'+fDate+'" onchange="fDate=this.value"></div>';
  html+='<div class="fg"><label class="fl">Note</label><input class="fi" type="text" placeholder="e.g. Don Quijote Shibuya" id="fNoteI" value="'+(fNote||"")+'" oninput="fNote=this.value"></div>';
  html+='<div class="fg"><label class="fl">Receipt</label>';
  if(fRec)html+='<img src="'+fRec+'" class="rprev"><button style="margin-top:6px;background:none;border:none;color:var(--cr);font-size:12px;cursor:pointer;font-weight:600" onclick="fRec=null;render()">✕ Remove</button>';
  else html+='<div class="rbtns"><button class="rbtn" onclick="captureReceipt(\'camera\')">📸 Camera</button><button class="rbtn" onclick="captureReceipt(\'file\')">📁 Upload</button></div>';
  html+='</div>';
  html+='<button class="submit" '+(!fAmt||!fCat?"disabled":"")+'  onclick="submitExp()">💾 '+(editKey?"Update":"Add Expense")+'</button></div>';
  app.innerHTML=html;
}

function submitExp(){
  if(!fAmt||!fCat)return;
  var aed=toAED(parseFloat(fAmt),fCur);
  var exp={amount:aed,origAmt:parseFloat(fAmt),origCur:fCur,category:fCat,paidBy:fPaid,note:fNote,date:fDate,country:fCo,taxFree:fTF,receipt:fRec,ts:Date.now()};
  if(editKey)db.ref("expenses/"+editKey).set(exp);
  else db.ref("expenses").push(exp);
  flash(editKey?"Updated!":"Added!");
  resetForm();view="home";render();
}

function captureReceipt(mode){
  var inp=document.createElement("input");inp.type="file";inp.accept="image/*";
  if(mode==="camera")inp.setAttribute("capture","environment");
  inp.onchange=function(e){var f=e.target.files[0];if(!f)return;
    var reader=new FileReader();reader.onload=function(ev){
      var img=new Image();img.onload=function(){
        var MAX=800,w=img.width,ht=img.height;
        if(w>MAX){ht*=MAX/w;w=MAX}if(ht>MAX){w*=MAX/ht;ht=MAX}
        var c=document.createElement("canvas");c.width=w;c.height=ht;
        c.getContext("2d").drawImage(img,0,0,w,ht);
        fRec=c.toDataURL("image/jpeg",0.5);render();
      };img.src=ev.target.result;
    };reader.readAsDataURL(f);
  };inp.click();
}

function renderStats(app){
  var f=filtered(),tot=f.reduce(function(s,e){return s+e.amount},0);
  var byP=PEOPLE.map(function(p){return{name:p,total:f.filter(function(e){return e.paidBy===p}).reduce(function(s,e){return s+e.amount},0)}});
  var byC=categories.map(function(c){return{id:c.id,icon:c.icon,name:c.name,color:c.color,total:f.filter(function(e){return e.category===c.id}).reduce(function(s,e){return s+e.amount},0)}}).filter(function(c){return c.total>0}).sort(function(a,b){return b.total-a.total});
  function bar(l,v,p,c){return'<div class="bi"><div class="bh"><span class="bl">'+l+'</span><span class="bv">'+v+'</span></div><div class="bt"><div class="bf" style="width:'+p+'%;background:'+c+'"></div></div></div>'}
  var html='<div class="hdr"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><h1>Statistics</h1><p>Breakdown</p></div><button class="ct" onclick="showCurPicker()">'+CUR[dCur].f+' '+dCur+' ▾</button></div></div><div class="hs">';
  allMonths().forEach(function(m){html+='<button class="pill'+(m===selMo?" on":"")+'" onclick="selMo=\''+m+'\';render()">'+gml(m)+'</button>'});
  html+='</div><div class="cg"><div class="card hero"><div class="lbl">Month Total</div><div class="val">'+disp(tot)+'</div>'+(dCur!=="AED"?'<div style="font-size:12px;color:var(--t2);margin-top:2px">'+fmt(tot,"AED")+'</div>':'')+'</div></div>';
  html+='<div class="sec">By Category</div>';
  if(!byC.length)html+='<div class="empty"><p>No data</p></div>';
  else byC.forEach(function(c){html+=bar(c.icon+" "+c.name,disp(c.total)+" ("+(tot?Math.round(c.total/tot*100):0)+"%)",tot?c.total/tot*100:0,c.color)});
  html+='<div class="sec" style="margin-top:8px">By Person</div>';
  byP.forEach(function(p){html+=bar((p.name==="Husband"?"🙋‍♂️":"🙋‍♀️")+" "+p.name,disp(p.total),tot?p.total/tot*100:0,p.name==="Husband"?"var(--gd)":"var(--tl)")});
  app.innerHTML=html;
}

function renderTax(app){
  var all=expList(),tCD=TAX[tCo],tEl=all.filter(function(e){return e.country===tCo&&e.taxFree}),tTot=tEl.reduce(function(s,e){return s+e.amount},0),tRef=tTot*(tCD?tCD.rate:0)/(100+(tCD?tCD.rate:0));
  var allTC={},grandRef=0;
  for(var k in TAX){var el=all.filter(function(e){return e.country===k&&e.taxFree});var tot=el.reduce(function(s,e){return s+e.amount},0);grandRef+=tot*TAX[k].rate/(100+TAX[k].rate);if(el.length)allTC[k]=1}
  var allTCkeys=Object.keys(allTC);

  var html='<div class="hdr"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><h1>Tax Refund</h1><p>Eligible refunds</p></div><button class="ct" onclick="showCurPicker()">'+CUR[dCur].f+' '+dCur+' ▾</button></div></div>';
  html+='<div style="display:flex;gap:6px;padding:0 20px 12px"><button class="tab'+(tMode==="calc"?" on":"")+'" onclick="tMode=\'calc\';render()">Calculator</button><button class="tab'+(tMode==="all"?" on":"")+'" onclick="tMode=\'all\';render()">All Countries</button></div>';

  if(tMode==="calc"){
    html+='<div class="hs">';for(var k in TAX)html+='<button class="pill'+(tCo===k?" on":"")+'" onclick="tCo=\''+k+'\';render()">'+TAX[k].flag+' '+TAX[k].name+'</button>';html+='</div>';
    html+='<div class="tcard"><div style="display:flex;align-items:center;gap:12px;margin-bottom:14px"><span style="font-size:36px">'+(tCD?tCD.flag:"")+'</span><div><div style="font-weight:700;font-size:18px">'+(tCD?tCD.name:"")+'</div><div style="font-size:12px;color:var(--t2)">Tax: '+(tCD?tCD.rate:0)+'%</div></div></div><div style="font-size:12px;color:var(--t2)"><strong>Tax-free items:</strong> '+tEl.length+' · '+disp(tTot)+'</div><div class="trbig">'+(tCD&&tCD.rate>0?disp(tRef):"No refund")+'</div><div style="font-size:12px;color:var(--t2)">'+(tCD&&tCD.rate>0?"Est. "+tCD.rate+"% refund":"No tourist refunds.")+'</div><div class="tibox">ℹ️ '+(tCD?tCD.notes:"")+'</div></div>';
    if(tEl.length){
      html+='<div class="sec">Eligible</div><div class="el">';
      tEl.sort(function(a,b){return new Date(b.date)-new Date(a.date)}).forEach(function(e){
        var cat=gc(e.category),rf=e.amount*tCD.rate/(100+tCD.rate);
        html+='<div class="eitem"><div class="eico" style="background:'+cat.color+'15">'+cat.icon+'</div><div class="einfo"><div class="enm">'+cat.name+'</div><div class="emt"><span>'+new Date(e.date).toLocaleDateString("en-GB",{day:"numeric",month:"short"})+'</span><span>·</span><span>'+disp(e.amount)+'</span></div></div><div class="eamt" style="color:var(--tl)">+'+disp(rf)+'</div></div>';
      });html+='</div>';
    }
  }else{
    html+='<div class="tcard"><div class="lbl">Total Refund — All Countries</div><div class="trbig">'+disp(grandRef)+'</div><div style="font-size:12px;color:var(--t2)">'+allTCkeys.length+' countr'+(allTCkeys.length===1?"y":"ies")+'</div></div><div class="sec">By Country</div><div style="padding:0 20px">';
    if(!allTCkeys.length)html+='<div class="empty"><div class="eI">🏷️</div><p>No tax-free purchases yet</p></div>';
    else for(var k in TAX){var el=all.filter(function(e){return e.country===k&&e.taxFree});if(!el.length)continue;var tot=el.reduce(function(s,e){return s+e.amount},0),rf=tot*TAX[k].rate/(100+TAX[k].rate);
      html+='<div class="tcitem" onclick="tCo=\''+k+'\';tMode=\'calc\';render()"><span style="font-size:28px">'+TAX[k].flag+'</span><div style="flex:1"><div style="font-weight:600;font-size:14px">'+TAX[k].name+'</div><div style="font-size:11px;color:var(--t2)">'+el.length+' items · '+TAX[k].rate+'%</div></div><div style="font-weight:700;font-size:14px;color:var(--tl)">+'+disp(rf)+'</div></div>';}
    html+='</div>';
  }
  app.innerHTML=html;
}

function renderCats(app){
  var html='<div style="padding:28px 20px 20px"><h2 style="font-size:20px;font-weight:700;margin-bottom:18px">Categories</h2>';
  categories.forEach(function(c){html+='<div class="cmitem"><span style="font-size:20px">'+c.icon+'</span><span style="font-weight:500;font-size:13px">'+c.name+'</span><span style="width:12px;height:12px;border-radius:3px;background:'+c.color+';margin-left:4px"></span></div>'});
  html+='<div class="sec" style="padding:24px 0 6px">Exchange Rates</div><div style="font-size:11px;color:var(--t2);margin-bottom:8px">Approximate rates vs 1 AED</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">';
  for(var k in CUR)html+='<div style="padding:8px 10px;background:var(--cd);border-radius:10px;font-size:12px;display:flex;justify-content:space-between;border:1px solid rgba(255,255,255,0.02)"><span>'+CUR[k].f+' '+k+'</span><span style="color:var(--t2)">'+(CUR[k].r===1?"Base":CUR[k].r)+'</span></div>';
  html+='</div></div>';
  app.innerHTML=html;
}

function showCurPicker(){
  var ov=document.createElement("div");ov.className="ov";ov.onclick=function(){ov.remove()};
  var inner='<div class="cpick" onclick="event.stopPropagation()"><div style="font-weight:700;font-size:16px;margin-bottom:14px">Display Currency</div><div style="font-size:11px;color:var(--t2);margin-bottom:12px">All totals convert to this</div><div class="clist">';
  var order=PRI.concat(Object.keys(CUR).filter(function(c){return PRI.indexOf(c)<0}).sort());
  order.forEach(function(code){inner+='<button class="copt'+(dCur===code?" on":"")+'" onclick="dCur=\''+code+'\';this.closest(\'.ov\').remove();render()"><span style="font-size:18px">'+CUR[code].f+'</span><span style="font-weight:600;font-size:13px">'+code+'</span><span style="font-size:9px;color:var(--t2)">'+CUR[code].n+'</span></button>'});
  inner+='</div></div>';ov.innerHTML=inner;document.body.appendChild(ov);
}

function showReceipt(src){if(!src)return;var ov=document.createElement("div");ov.className="r-modal";ov.onclick=function(){ov.remove()};ov.innerHTML='<button class="r-close" onclick="event.stopPropagation();this.parentElement.remove()">✕</button><img src="'+src+'" style="max-width:100%;max-height:80vh;border-radius:12px">';document.body.appendChild(ov)}

function exportCSV(){
  var f=filtered(),csv="Date,Country,Category,OrigAmt,Currency,AED,PaidBy,TaxFree,Note\n";
  f.forEach(function(e){var cat=gc(e.category),co=TAX[e.country]||{name:""};csv+=e.date+","+co.name+","+cat.name+","+(e.origAmt||e.amount)+","+(e.origCur||"AED")+","+e.amount.toFixed(2)+","+e.paidBy+","+(e.taxFree?"Y":"N")+",\""+(e.note||"")+"\"\n"});
  var b=new Blob([csv],{type:"text/csv"}),a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="expenses-"+selMo+".csv";a.click();flash("Exported!");
}

// Enable offline persistence
db.goOnline();
</script>
